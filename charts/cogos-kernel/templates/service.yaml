apiVersion: v1
kind: Service
metadata:
  name: {{ include "cogos-kernel.fullname" . }}
  labels:
    app.kubernetes.io/name: cogos-kernel
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: cogos-kernel
    app.kubernetes.io/instance: {{ .Release.Name }}
