apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "cogos-kernel.fullname" . }}-workspace
  labels:
    app.kubernetes.io/name: cogos-kernel
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.workspace.storageClass }}
  storageClassName: {{ .Values.workspace.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.workspace.size }}
