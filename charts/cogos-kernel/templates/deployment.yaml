apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cogos-kernel.fullname" . }}
  labels:
    app.kubernetes.io/name: cogos-kernel
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate  # Only one kernel instance per workspace
  selector:
    matchLabels:
      app.kubernetes.io/name: cogos-kernel
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cogos-kernel
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: cogos
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --workspace
            - {{ .Values.workspace.path }}
            - --port
            - "{{ .Values.port }}"
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: workspace
              mountPath: {{ .Values.workspace.path }}
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "cogos-kernel.fullname" . }}-workspace
