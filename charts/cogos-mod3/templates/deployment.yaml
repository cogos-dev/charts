apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cogos-mod3.fullname" . }}
  labels:
    app.kubernetes.io/name: cogos-mod3
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate  # Only one Mod³ instance per deployment
  selector:
    matchLabels:
      app.kubernetes.io/name: cogos-mod3
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cogos-mod3
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: mod3
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python
            - server.py
            - --http
            - "{{ .Values.port }}"
          env:
            - name: COGOS_ENDPOINT
              value: {{ tpl .Values.kernel.endpoint . | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # macOS deployments may need host audio access instead of a fully containerized Mod³ pod.
